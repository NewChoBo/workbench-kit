name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: workbench-kit-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build workspace packages
        run: node scripts/build-workspace-packages.mjs

      - name: Install Playwright browser
        run: pnpm exec --package=playwright@1.60.0 playwright install --with-deps chromium

      - name: Validate
        # validate:full = validate + required storybook baseline play runs
        run: pnpm validate:full
