name: CI

on:
  pull_request:
    branches:
      - main
      - staging
  push:
    branches:
      - main
      - staging

permissions:
  contents: read

concurrency:
  group: workbench-kit-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build workspace packages
        run: node scripts/build-workspace-packages.mjs

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Validate
        # validate:full = validate + required storybook baseline play runs
        run: pnpm validate:full
