name: Publish Workbench Kit

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
      - 'workbench-kit-v*'
  workflow_dispatch:
    inputs:
      npm_tag:
        description: npm dist-tag to publish with
        required: false
        default: prototype
      mode:
        description: dry-run validates the pipeline without pushing to npm
        type: choice
        options:
          - dry-run
          - publish
        default: dry-run
      branch_publish_confirm:
        description: Required for branch publish — enter publish-from-branch
        required: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-workbench-kit-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish packages to npm
    runs-on: ubuntu-latest
    env:
      NPM_DIST_TAG: ${{ inputs.npm_tag || 'prototype' }}
      NPM_PUBLISH_UPDATES_ONLY: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync package version from tag
        if: github.ref_type == 'tag'
        run: node scripts/sync-version-from-tag.mjs

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build workspace packages
        run: node scripts/build-workspace-packages.mjs

      - name: Verify release tag
        run: node scripts/check-release-version.mjs

      - name: Prepare npm for trusted publishing
        run: |
          npm install -g npm@11
          for rc in "${NPM_CONFIG_USERCONFIG:-}" "$HOME/.npmrc"; do
            if [ -n "$rc" ] && [ -f "$rc" ]; then
              sed -i '/_authToken/d;/always-auth/d' "$rc" || true
            fi
          done
          unset NODE_AUTH_TOKEN NPM_TOKEN || true
          if [ -n "${NPM_TOKEN:-}" ]; then
            echo "::warning::NPM_TOKEN secret is set but ignored. Publish uses trusted publishing only."
          fi

      - name: Preflight npm publish auth
        run: node scripts/preflight-npm-publish.mjs

      - name: Validate
        run: pnpm validate

      - name: Guard branch publish
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'publish' && github.ref_type != 'tag' && inputs.branch_publish_confirm != 'publish-from-branch'
        run: |
          echo "::error::Publishing from a branch requires branch_publish_confirm=publish-from-branch"
          exit 1

      - name: Publish (dry run)
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'dry-run'
        run: node scripts/publish-packages.mjs --dry-run

      - name: Publish
        if: github.event_name == 'release' || github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'publish')
        run: node scripts/publish-packages.mjs
