name: Deploy Workbench Sample

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
      - 'workbench-kit-v*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: workbench-sample-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Pages artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref_name }}

      - name: Sync package version from tag
        if: github.event_name == 'release' || github.ref_type == 'tag'
        run: node scripts/sync-version-from-tag.mjs "${{ github.event.release.tag_name || github.ref_name }}"

      - name: Verify release tag
        if: github.event_name == 'release' || github.ref_type == 'tag'
        run: node scripts/check-release-version.mjs

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build workspace packages
        run: node scripts/build-workspace-packages.mjs

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Typecheck sample
        run: pnpm --filter workbench-sample typecheck

      - name: Build sample
        env:
          WORKBENCH_SAMPLE_BASE_PATH: ${{ steps.pages.outputs.base_path }}/
        run: pnpm --filter workbench-sample build

      - name: Build Storybook for Pages
        env:
          STORYBOOK_BASE_PATH: ${{ steps.pages.outputs.base_path }}/storybook/
        run: pnpm build:storybook

      - name: Copy Storybook into sample dist
        run: |
          mkdir -p examples/workbench-sample/dist/storybook
          cp -r storybook-static/. examples/workbench-sample/dist/storybook/

      - name: Disable Jekyll processing
        run: touch examples/workbench-sample/dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: examples/workbench-sample/dist

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'release' || github.ref_type == 'tag'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
