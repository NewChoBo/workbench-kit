name: Deploy Workbench Sample

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: workbench-sample-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Pages artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.5.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build workspace packages
        run: node scripts/build-workspace-packages.mjs

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Typecheck sample
        run: pnpm --filter workbench-sample typecheck

      - name: Build sample
        env:
          WORKBENCH_SAMPLE_BASE_PATH: ${{ steps.pages.outputs.base_path }}/
        run: pnpm --filter workbench-sample build

      - name: Disable Jekyll processing
        run: touch examples/workbench-sample/dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: examples/workbench-sample/dist

  deploy:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
