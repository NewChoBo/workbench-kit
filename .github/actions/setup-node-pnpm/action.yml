name: Setup Node and pnpm
description: Enable pnpm via corepack, then install Node with pnpm cache.

inputs:
  node-version:
    description: Node.js version
    required: false
    default: '24'

runs:
  using: composite
  steps:
    - name: Enable pnpm
      shell: bash
      run: |
        corepack enable
        corepack prepare pnpm@11.5.1 --activate

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
